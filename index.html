<!DOCTYPE html>
<html>
<body>
    <button onclick="connect()">1. CONNECT</button>
    <div style="font-size: 2em;">
        RAW DATA FROM BOARD: <span id="debug">WAITING...</span>
    </div>

    <script>
    async function connect() {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'NanoPhys_S3' }],
            optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
        const char = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
        
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', (e) => {
            let str = new TextDecoder().decode(e.target.value);
            document.getElementById('debug').innerText = str;
            console.log("Received:", str);
        });
        alert("Connected! Watch the screen.");
    }
    </script>
</body>
</html>
