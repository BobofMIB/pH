<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>pH Pro: Lab Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00d1b2; --text: #c9d1d9; --ph7: #4cd137; --ph4: #e84118; --danger: #f85149; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        .hidden { display: none !important; }
        .view-controls { display: flex; justify-content: space-around; background: #000; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
        .view-controls label { font-size: 0.8em; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        input[type="checkbox"] { accent-color: var(--accent); scale: 1.2; }
        .ph-display { font-size: 6em; text-align: center; font-weight: 800; margin: 10px 0; color: #ffdd57; font-family: monospace; line-height: 1; }
        .diag-box { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #444; text-align: center; margin-bottom: 15px; }
        .raw-num { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 1.3em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-ble { background: var(--accent); color: #000; margin-bottom: 15px; font-size: 1em; }
        .btn-sub { background: #21262d; color: #fff; border: 1px solid #444; }
        .btn-sub.ph7 { border-bottom: 4px solid var(--ph7); }
        .btn-sub.ph4 { border-bottom: 4px solid var(--ph4); }
        .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px; padding: 10px; font-size: 0.75em; width: 100%; }
        .btn-success { background: #2ea44f !important; color: white !important; }
        .label { font-size: 0.7em; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button id="bleBtn" class="btn btn-ble" onclick="connectBLE()">CONNECT NANO S3</button>

    <div class="view-controls">
        <label><input type="checkbox" id="toggleCal" onchange="updateVisibility()"> CALIBRATION</label>
        <label><input type="checkbox" id="toggleGraph" onchange="updateVisibility()"> GRAPH</label>
    </div>

    <div class="card">
        <div class="label" style="text-align: center;">Live pH Level</div>
        <div id="phVal" class="ph-display">--.-</div>
    </div>

    <div id="calSection" class="card hidden">
        <div class="label">Calibration</div>
        <div class="diag-box">
            <span style="color: #8b949e; font-size: 0.8em;">LIVE RAW ADC: </span>
            <span id="rawDisplay" class="raw-num">----</span>
        </div>
        <div class="grid">
            <button id="btn7" class="btn btn-sub ph7" onclick="doSubmit('CAL:7', 'btn7')">SUBMIT pH 7</button>
            <button id="btn4" class="btn btn-sub ph4" onclick="doSubmit('CAL:4', 'btn4')">SUBMIT pH 4</button>
        </div>
        <button id="resetCal" class="btn btn-reset" onclick="doSubmit('CAL:RESET', 'resetCal')">RESET CALIBRATION</button>
    </div>

    <div id="graphSection" class="card hidden">
        <div class="label">pH Trend</div>
        <canvas id="phChart" style="margin-top:10px;"></canvas>
        <button class="btn btn-reset" onclick="resetGraph()">CLEAR GRAPH</button>
    </div>
</div>

<script>
    let pDataChar, pCmdChar, phChart, startTime = null;
    let phHistory = [];

    function updateVisibility() {
        document.getElementById('calSection').classList.toggle('hidden', !document.getElementById('toggleCal').checked);
        document.getElementById('graphSection').classList.toggle('hidden', !document.getElementById('toggleGraph').checked);
        if (phChart) phChart.resize();
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'NanoPhys_S3' }],
                optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
            pDataChar = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
            pCmdChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");

            await pDataChar.startNotifications();
            pDataChar.addEventListener('characteristicvaluechanged', (e) => {
                // REPAIRED DATA PARSING
                let decoder = new TextDecoder();
                let str = decoder.decode(e.target.value).replace(/\s+/g, ''); // Remove all spaces/newlines
                
                if (str.includes("PH:")) {
                    let val = parseFloat(str.split("PH:")[1]);
                    if (!isNaN(val)) {
                        document.getElementById('phVal').innerText = val.toFixed(2);
                        updateGraph(val);
                    }
                } 
                if (str.includes("RAW:")) {
                    let raw = str.split("RAW:")[1];
                    document.getElementById('rawDisplay').innerText = raw;
                }
            });

            document.getElementById('bleBtn').innerText = "ONLINE";
            document.getElementById('bleBtn').classList.add('btn-success');
            initGraph();
            startTime = Date.now();
        } catch (err) { console.log(err); }
    }

    async function doSubmit(cmd, btnId) {
        if (!pCmdChar) return;
        const btn = document.getElementById(btnId);
        try {
            await pCmdChar.writeValue(new TextEncoder().encode(cmd));
            const oldText = btn.innerText;
            btn.innerText = "SENT ✓";
            setTimeout(() => { btn.innerText = oldText; }, 1200);
        } catch (e) { console.log(e); }
    }

    function resetGraph() {
        phHistory = [];
        startTime = Date.now();
        if (phChart) {
            phChart.data.datasets[0].data = phHistory;
            phChart.update();
        }
    }

    function initGraph() {
        const ctx = document.getElementById('phChart').getContext('2d');
        phChart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ label: 'pH', data: phHistory, borderColor: '#ffdd57', tension: 0.3, pointRadius: 2 }]},
            options: {
                scales: {
                    x: { type: 'linear', title: { display: true, text: 'Seconds' }, grid: { color: '#333' } },
                    y: { min: 0, max: 14, title: { display: true, text: 'pH' }, grid: { color: '#333' } }
                },
                plugins: { legend: { display: false } },
                animation: false
            }
        });
    }

    function updateGraph(val) {
        if (!phChart || startTime === null) return;
        const elapsed = (Date.now() - startTime) / 1000;
        phHistory.push({ x: elapsed, y: val });
        if (phHistory.length > 100) phHistory.shift();
        phChart.update('none');
    }
</script>
</body>
</html>
