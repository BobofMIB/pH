<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>pH Pro: Diagnostic Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00d1b2; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        
        /* Diagnostic Styles */
        .raw-monitor { display: flex; justify-content: space-between; background: #000; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #444; }
        .raw-value { font-family: monospace; color: #ffdd57; font-weight: bold; }
        
        .ph-display { font-size: 4em; text-align: center; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-cal { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-cal.success { background: #2ea44f; color: white; }
        
        .label { font-size: 0.7em; color: #8b949e; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <button id="bleBtn" class="btn" onclick="connectBLE()" style="background: var(--accent); color: #000; margin-bottom: 20px;">CONNECT TO NANO S3</button>

    <div class="card">
        <div class="label">Hardware Diagnostics</div>
        <div class="raw-monitor">
            <span>Raw ADC (A7):</span>
            <span id="rawVal" class="raw-value">OFFLINE</span>
        </div>
        <div style="font-size: 0.8em; color: #8b949e;">
            * 4095 = Disconnected/High | 0 = Short to GND
        </div>
    </div>

    <div class="card">
        <div class="label" style="text-align:center;">Calibrated pH</div>
        <div id="phVal" class="ph-display">--.-</div>
    </div>

    <div class="card">
        <div class="label">Calibration (Step-by-Step)</div>
        <button id="btn7" class="btn btn-cal" onclick="confirmCal('CAL:7', 'btn7')">SET PH 7.0 REFERENCE</button>
        <button id="btn4" class="btn btn-cal" onclick="confirmCal('CAL:4', 'btn4')">SET PH 4.0 REFERENCE</button>
        <p style="font-size: 0.75em; color: #8b949e; margin-top: 10px;">
            Dip probe in buffer, wait for Raw ADC to stabilize, then click to sync.
        </p>
    </div>
</div>

<script>
    let pDataChar, pCmdChar;

    async function connectBLE() {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'NanoPhys_S3' }],
            optionalServices: ["19b10000-e8f2-537e-4f6c-d104768a1214"]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("19b10000-e8f2-537e-4f6c-d104768a1214");
        pDataChar = await service.getCharacteristic("19b10001-e8f2-537e-4f6c-d104768a1214");
        pCmdChar = await service.getCharacteristic("19b10002-e8f2-537e-4f6c-d104768a1214");

        await pDataChar.startNotifications();
        pDataChar.addEventListener('characteristicvaluechanged', (e) => {
            const str = new TextDecoder().decode(e.target.value);
            
            // Handle standard pH reading
            if (str.startsWith("PH:")) {
                document.getElementById('phVal').innerText = str.substring(3);
            }
            
            // Handle Raw troubleshooting data (Requires small Arduino change below)
            if (str.startsWith("RAW:")) {
                document.getElementById('rawVal').innerText = str.substring(4);
            }
        });
        document.getElementById('bleBtn').innerText = "SYSTEM READY";
    }

    async function confirmCal(cmd, btnId) {
        if (!pCmdChar) return alert("Connect BLE first!");
        
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        
        try {
            btn.innerText = "SENDING SYNC...";
            await pCmdChar.writeValue(new TextEncoder().encode(cmd));
            
            // Visual confirmation
            btn.classList.add('success');
            btn.innerText = "VALUES STORED ✓";
            
            setTimeout(() => {
                btn.classList.remove('success');
                btn.innerText = originalText;
            }, 2000);
        } catch (e) {
            btn.innerText = "RETRY ERROR";
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    }
</script>
</body>
</html>
